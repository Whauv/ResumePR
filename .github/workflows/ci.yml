name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run API tests
        run: python -m pytest tests -o cache_dir=.pytest_cache
      - name: Compile API sources
        run: python -m compileall main.py routers services tests

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test
      - name: Build web app
        env:
          VITE_FIREBASE_CONFIG: '{"apiKey":"test","authDomain":"test.local","projectId":"resumepr-test","appId":"app-test"}'
          VITE_API_URL: http://127.0.0.1:8000
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke tests
        env:
          VITE_FIREBASE_CONFIG: '{"apiKey":"test","authDomain":"test.local","projectId":"resumepr-test","appId":"app-test"}'
          VITE_API_URL: http://127.0.0.1:8000
          CI: "true"
        run: npm run test:e2e
