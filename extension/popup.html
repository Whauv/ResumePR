<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResumePR</title>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        padding: 20px;
        font-family: Arial, sans-serif;
        background: #f5f7f7;
        color: #1f2937;
      }

      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(1, 105, 111, 0.12);
        color: #01696f;
        font-size: 12px;
        font-weight: 700;
      }

      button {
        width: 100%;
        margin-top: 16px;
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        background: #01696f;
        color: white;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .secondary {
        background: white;
        color: #1f2937;
        border: 1px solid #d6d3d1;
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .panel {
        margin-top: 16px;
        border-radius: 18px;
        background: white;
        padding: 14px;
      }

      .meta {
        margin: 6px 0 0;
        font-size: 13px;
        color: #475569;
      }

      .toast {
        margin-top: 12px;
        border-radius: 14px;
        padding: 10px 12px;
        font-size: 13px;
        display: none;
      }

      .toast.show {
        display: block;
      }

      .toast.success {
        background: rgba(1, 105, 111, 0.12);
        color: #01696f;
      }

      .toast.error {
        background: rgba(225, 29, 72, 0.12);
        color: #be123c;
      }
    </style>
  </head>
  <body>
    <span class="badge">Phase 2</span>
    <h1>ResumePR</h1>
    <p>Extract the active job posting and send it to Resume Modifier for analysis.</p>
    <div class="panel">
      <strong id="job-title">Waiting for job page</strong>
      <p class="meta" id="company-name">Open a supported job board tab to begin.</p>
      <p class="meta" id="auth-status">Checking sign-in state...</p>
    </div>
    <button id="send-button" type="button">Send to Resume Modifier</button>
    <button id="signin-button" type="button" class="secondary">Open Resume Modifier to sign in</button>
    <div class="toast" id="toast"></div>
    <script src="popup.js"></script>
  </body>
</html>
